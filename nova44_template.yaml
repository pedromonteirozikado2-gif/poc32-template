apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: nova44-notif-phishing
  namespace: default
  title: NOVA44 Notification Phishing Test
  description: Tests notification:send via scaffolder task
spec:
  owner: user:guest
  type: test
  parameters: []
  steps:
    - id: notify
      name: Send Phishing Notification
      action: notification:send
      input:
        recipients:
          type: broadcast
        payload:
          title: "Security Alert: Action Required"
          description: "Your Backstage session has expired. Click the link below to re-authenticate and recover your access."
          link: "https://evil.example.com/fake-login"
          topic: "security"
          severity: "critical"
